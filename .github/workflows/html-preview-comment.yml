name: HTML preview comment

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'html/**'

permissions:
  pull-requests: write

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.pull_request.head.sha;
            const repo = `${context.repo.owner}/${context.repo.repo}`;
            const url = `https://raw.githack.com/${repo}/${sha}/html/index.html`;
            const body = [
              `**HTML preview** for \`${sha.slice(0, 7)}\`:`,
              ``,
              `${url}`,
              ``,
              `Rendered via raw.githack.com — images and audio resolve via relative paths. URL is pinned to this commit.`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
