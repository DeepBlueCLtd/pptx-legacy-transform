name: Deploy html/ to gh-pages

on:
  push:
    branches: [main]
    paths:
      - 'html/**'
  workflow_dispatch:

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          path: main-checkout

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-checkout

      - name: Sync html/ into gh-pages
        run: |
          set -euo pipefail
          rm -rf gh-pages-checkout/html
          mkdir -p gh-pages-checkout/html
          cp -R main-checkout/html/. gh-pages-checkout/html/

      - name: Ensure link on gh-pages index
        run: |
          set -euo pipefail
          cd gh-pages-checkout
          if ! grep -q 'href="html/"' index.html; then
            sed -i 's|  </ul>|    <li><a href="html/">Published HTML output</a> \&mdash; generated HTML view of the DITA pipeline output.</li>\n  </ul>|' index.html
          fi

      - name: Commit and push
        run: |
          set -euo pipefail
          cd gh-pages-checkout
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Deploy html/ from ${GITHUB_SHA::7}"
          for attempt in 1 2 3 4; do
            if git push origin gh-pages; then
              exit 0
            fi
            sleep $((2 ** attempt))
            git pull --rebase origin gh-pages
          done
          echo "push failed after retries" >&2
          exit 1
